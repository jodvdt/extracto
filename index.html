<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extracto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0b0b;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #efefef;
    --muted: #777;
    --muted2: #444;
    --accent: #c8f53a;
    --accent-dim: rgba(200,245,58,0.1);
    --accent-border: rgba(200,245,58,0.25);
    --danger: #f55a5a;
    --success: #3af5a0;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
    --rad: 10px;
    --rad-lg: 16px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 5rem;
  }

  .container { width: 100%; max-width: 600px; }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2.5rem;
  }

  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-name { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
  .logo-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 1px; }

  .input-card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--rad-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .field-label {
    font-size: 10px; font-family: var(--mono); text-transform: uppercase;
    letter-spacing: 1.4px; color: var(--muted); margin-bottom: 8px; display: block;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--rad);
    padding: 14px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.65;
    resize: none;
    outline: none;
    transition: border-color 0.18s;
    min-height: 160px;
    margin-bottom: 1rem;
  }

  textarea::placeholder { color: var(--muted2); }
  textarea:focus { border-color: var(--accent-border); }
  textarea.shake { animation: shake 0.35s ease; border-color: var(--danger); }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }

  .controls { display: flex; gap: 10px; align-items: stretch; }

  .select-wrap { position: relative; flex: 1; }

  select {
    width: 100%; height: 44px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--rad);
    padding: 0 36px 0 13px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    cursor: pointer;
    appearance: none; -webkit-appearance: none;
    outline: none;
    transition: border-color 0.15s;
  }

  select:focus { border-color: var(--accent-border); }

  .select-arrow {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    pointer-events: none; color: var(--muted);
    display: flex; align-items: center;
  }

  .go-btn {
    height: 44px; padding: 0 22px;
    background: var(--accent);
    border: none; border-radius: var(--rad);
    color: #0b0b0b;
    font-family: var(--font); font-size: 14px; font-weight: 700;
    letter-spacing: -0.1px;
    cursor: pointer; white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  .go-btn:hover { opacity: 0.84; }
  .go-btn:active { transform: scale(0.97); }
  .go-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .hint {
    margin-top: 10px; font-size: 12px; color: var(--muted);
    font-family: var(--mono); line-height: 1.5; min-height: 18px;
  }

  /* Status bar */
  .status-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--rad);
    font-size: 12px; font-family: var(--mono); color: var(--muted);
    margin-bottom: 1.25rem;
    min-height: 40px;
    transition: border-color 0.2s;
  }

  .status-bar.active { border-color: var(--accent-border); }
  .status-bar.done   { border-color: rgba(58,245,160,0.25); }
  .status-bar.err    { border-color: rgba(245,90,90,0.25); }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted2); flex-shrink: 0;
    transition: background 0.2s;
  }

  .status-dot.pulse { background: var(--accent); animation: blink 1.1s ease-in-out infinite; }
  .status-dot.done  { background: var(--success); }
  .status-dot.err   { background: var(--danger); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Pipeline log */
  .pipeline {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--rad);
    padding: 10px 14px;
    margin-bottom: 1.25rem;
    max-height: 120px;
    overflow-y: auto;
  }

  .pipeline::-webkit-scrollbar { width: 4px; }
  .pipeline::-webkit-scrollbar-track { background: transparent; }
  .pipeline::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

  .log-line {
    font-size: 11px; font-family: var(--mono);
    color: var(--muted); line-height: 1.7;
    display: flex; align-items: baseline; gap: 8px;
  }

  .log-line .tag {
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    flex-shrink: 0; letter-spacing: 0.3px;
  }

  .tag-ok   { background: rgba(58,245,160,0.12); color: var(--success); border: 0.5px solid rgba(58,245,160,0.2); }
  .tag-fail { background: rgba(245,90,90,0.1);   color: var(--danger);  border: 0.5px solid rgba(245,90,90,0.2); }
  .tag-try  { background: var(--accent-dim);      color: var(--accent);  border: 0.5px solid var(--accent-border); }

  /* Results */
  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }

  .results-count { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  /* Image cards */
  .img-card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--rad);
    aspect-ratio: 1;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s;
  }

  .img-card:hover { border-color: var(--accent-border); }

  .checker {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(45deg, #222 25%, transparent 25%),
      linear-gradient(-45deg, #222 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #222 75%),
      linear-gradient(-45deg, transparent 75%, #222 75%);
    background-size: 14px 14px;
    background-position: 0 0, 0 7px, 7px -7px, -7px 0;
    opacity: 0.6;
  }

  .img-card img {
    position: relative; z-index: 2;
    max-width: 86%; max-height: 86%;
    object-fit: contain; display: block;
  }

  .img-overlay {
    position: absolute; inset: 0;
    background: rgba(11,11,11,0.86);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 7px; opacity: 0;
    transition: opacity 0.15s; z-index: 3;
  }

  .img-card:hover .img-overlay { opacity: 1; }

  .img-action {
    padding: 6px 14px; border-radius: 6px;
    border: 0.5px solid var(--accent-border);
    background: var(--accent-dim); color: var(--accent);
    font-family: var(--font); font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    width: 118px; text-align: center;
  }

  .img-action:hover { background: var(--accent); color: #0b0b0b; }

  .img-label {
    position: absolute; bottom: 7px; left: 7px; right: 7px;
    font-size: 9px; font-family: var(--mono); color: var(--muted);
    text-align: center; overflow: hidden; white-space: nowrap;
    text-overflow: ellipsis; z-index: 4;
  }

  .card-badge {
    position: absolute; top: 7px; right: 7px;
    padding: 2px 6px; border-radius: 4px;
    font-size: 9px; font-family: var(--mono); letter-spacing: 0.3px; z-index: 5;
    background: var(--accent-dim);
    border: 0.5px solid var(--accent-border);
    color: var(--accent);
  }

  .card-badge.fail { background: rgba(245,90,90,0.1); border-color: rgba(245,90,90,0.3); color: var(--danger); }

  /* Bundle */
  .bundle-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--rad-lg);
    padding: 1rem;
    margin-bottom: 1rem;
  }

  .bundle-canvas {
    width: 100%; aspect-ratio: 4/3;
    background: #111;
    background-image:
      linear-gradient(45deg,#181818 25%,transparent 25%),
      linear-gradient(-45deg,#181818 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#181818 75%),
      linear-gradient(-45deg,transparent 75%,#181818 75%);
    background-size: 20px 20px;
    background-position: 0 0,0 10px,10px -10px,-10px 0;
    border-radius: 8px;
    position: relative; overflow: hidden;
  }

  .bundle-item {
    position: absolute; cursor: grab;
    user-select: none; transform-origin: center;
  }

  .bundle-item:active { cursor: grabbing; }
  .bundle-item.selected { outline: 1.5px solid var(--accent); outline-offset: 3px; }
  .bundle-item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; display: block; }

  .bundle-controls { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  .ctrl-btn {
    padding: 7px 14px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--font); font-size: 12px;
    cursor: pointer; transition: all 0.15s;
  }

  .ctrl-btn:hover { border-color: var(--accent-border); color: var(--accent); }
  .ctrl-btn.primary { background: var(--accent); color: #0b0b0b; border-color: transparent; font-weight: 700; margin-left: auto; }
  .ctrl-btn.primary:hover { opacity: 0.85; color: #0b0b0b; }

  hr { border: none; border-top: 0.5px solid var(--border); margin: 1.5rem 0; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="page">
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" width="16" height="16">
        <rect x="2" y="2" width="6" height="6" rx="1.5" fill="#0b0b0b"/>
        <rect x="10" y="2" width="6" height="6" rx="1.5" fill="#0b0b0b"/>
        <rect x="2" y="10" width="6" height="6" rx="1.5" fill="#0b0b0b"/>
        <circle cx="13" cy="13" r="3.5" fill="#0b0b0b"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Extracto</div>
      <div class="logo-sub">Paste a brief or links. Get images.</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-card">
    <label class="field-label" for="brief">Brief or links</label>
    <textarea id="brief" placeholder="Paste your brief, product URLs, or a mix of both. Extracto handles the rest.

e.g.
Summer sale campaign — grab images for these:
https://store.com/products/item-one
https://anysite.com/product/item-two"></textarea>

    <div class="controls">
      <div class="select-wrap">
        <select id="mode" onchange="updateHint()">
          <option value="transparent">Transparent background images</option>
          <option value="bundle">Bundle image</option>
        </select>
        <div class="select-arrow">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M1.5 3.5L5.5 7.5L9.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <button class="go-btn" id="go-btn" onclick="handleGo()">Let's go!</button>
    </div>
    <div class="hint" id="hint">Extracts the main product image from each link and removes the background.</div>
  </div>

  <!-- Status -->
  <div class="status-bar hidden" id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-txt"></span>
  </div>

  <!-- Pipeline log -->
  <div class="pipeline hidden" id="pipeline"></div>

  <!-- Extract results -->
  <div id="extract-results" class="hidden">
    <div class="results-header">
      <span class="field-label" style="margin:0">Extracted images</span>
      <span class="results-count" id="extract-count"></span>
    </div>
    <div class="grid" id="extract-grid"></div>
  </div>

  <!-- Bundle results -->
  <div id="bundle-results" class="hidden">
    <hr>
    <span class="field-label">Bundle canvas — drag to arrange</span>
    <div class="bundle-wrap">
      <div class="bundle-canvas" id="bundle-canvas"></div>
      <div class="bundle-controls">
        <button class="ctrl-btn" onclick="autoArrange()">Auto-arrange</button>
        <button class="ctrl-btn" onclick="shuffleArrange()">Shuffle</button>
        <button class="ctrl-btn" onclick="clearSelected()">Deselect</button>
        <button class="ctrl-btn primary" onclick="exportBundle()">Export PNG</button>
      </div>
    </div>
  </div>

</div>
</div>

<script>
let bImgs = [], dragOff = { x:0, y:0 };

// ── Hint ──────────────────────────────────────────────────────────────────
function updateHint() {
  document.getElementById('hint').textContent =
    document.getElementById('mode').value === 'bundle'
      ? 'Extracts product images and arranges them into a single exportable bundle.'
      : 'Extracts the main product image from each link and removes the background.';
}

// ── Status ────────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  const bar = document.getElementById('status-bar');
  const dot = document.getElementById('status-dot');
  bar.classList.remove('hidden','active','done','err');
  dot.className = 'status-dot';
  if (state === 'loading') { bar.classList.add('active'); dot.classList.add('pulse'); }
  else if (state === 'done') { bar.classList.add('done'); dot.classList.add('done'); }
  else if (state === 'error') { bar.classList.add('err'); dot.classList.add('err'); }
  document.getElementById('status-txt').textContent = msg;
}

// ── Pipeline log ──────────────────────────────────────────────────────────
function logLine(tag, tagClass, msg) {
  const panel = document.getElementById('pipeline');
  panel.classList.remove('hidden');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="tag ${tagClass}">${tag}</span><span>${msg}</span>`;
  panel.appendChild(line);
  panel.scrollTop = panel.scrollHeight;
}

function clearLog() {
  const panel = document.getElementById('pipeline');
  panel.innerHTML = '';
  panel.classList.add('hidden');
}

// ── URL extraction ────────────────────────────────────────────────────────
function extractUrls(text) {
  const matches = text.match(/https?:\/\/[^\s"'<>)\]\n]+/g) || [];
  return [...new Set(matches.map(u => u.replace(/[.,;]+$/, '')))];
}

function labelFromUrl(url) {
  try {
    const parts = new URL(url).pathname.split('/').filter(Boolean);
    return parts[parts.length - 1]
      .replace(/-/g,' ').replace(/_/g,' ')
      .replace(/\.[^.]+$/, '').slice(0, 32) || url.slice(-28);
  } catch { return url.slice(-28); }
}

// ── Universal image fetcher ───────────────────────────────────────────────
// Strategy 1: Shopify product JSON (no proxy, instant)
async function tryShopifyJson(url) {
  try {
    const u = new URL(url);
    const parts = u.pathname.split('/').filter(Boolean);
    const idx = parts.indexOf('products');
    if (idx === -1) return null;
    const handle = parts[idx + 1];
    if (!handle) return null;
    const jsonUrl = `${u.origin}/products/${handle}.json`;
    const res = await fetch(jsonUrl, { signal: AbortSignal.timeout(6000) });
    if (!res.ok) return null;
    const data = await res.json();
    const imgs = data?.product?.images;
    if (!imgs?.length) return null;
    logLine('shopify', 'tag-ok', `Got image via Shopify JSON — ${handle}`);
    return imgs[0].src;
  } catch { return null; }
}

// Strategy 2: own Vercel edge proxy → parse og:image / twitter:image / JSON-LD
async function tryOgImage(url) {
  try {
    const proxy = `/api/proxy?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) return null;
    const data = await res.json();
    const html = data?.contents || '';
    if (!html) return null;

    // og:image
    const ogMatch = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
                 || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
    if (ogMatch?.[1] && ogMatch[1].startsWith('http')) {
      logLine('og:image', 'tag-ok', `Found og:image for ${labelFromUrl(url)}`);
      return ogMatch[1];
    }

    // twitter:image
    const twMatch = html.match(/<meta[^>]+name=["']twitter:image["'][^>]+content=["']([^"']+)["']/i)
                 || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+name=["']twitter:image["']/i);
    if (twMatch?.[1] && twMatch[1].startsWith('http')) {
      logLine('twitter:image', 'tag-ok', `Found twitter:image for ${labelFromUrl(url)}`);
      return twMatch[1];
    }

    // JSON-LD image
    const ldMatch = html.match(/"image"\s*:\s*"(https?:\/\/[^"]+\.(?:jpg|jpeg|png|webp)[^"]*)"/i);
    if (ldMatch?.[1]) {
      logLine('json-ld', 'tag-ok', `Found JSON-LD image for ${labelFromUrl(url)}`);
      return ldMatch[1];
    }

    // Largest <img> src that looks like a product image
    const imgMatches = [...html.matchAll(/<img[^>]+src=["']([^"']+)["'][^>]*>/gi)];
    const candidates = imgMatches
      .map(m => m[1])
      .filter(src => {
        const s = src.toLowerCase();
        return (s.startsWith('http') || src.startsWith('//')) &&
               (s.includes('/product') || s.includes('/image') || s.includes('cdn') || s.match(/\.(jpg|jpeg|png|webp)/)) &&
               !s.includes('logo') && !s.includes('icon') && !s.includes('sprite') && !s.includes('banner') && !s.includes('avatar');
      })
      .map(src => src.startsWith('//') ? 'https:' + src : src);

    if (candidates.length) {
      logLine('img scan', 'tag-ok', `Found product image via img scan for ${labelFromUrl(url)}`);
      return candidates[0];
    }

    return null;
  } catch { return null; }
}

// Strategy 3: allorigins public proxy fallback
async function tryCorsproxy(url) {
  try {
    const proxy = `https://api.allorigins.win/get?${encodeURIComponent(url)}`;
    const res = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) return null;
    const html = await res.text();

    const ogMatch = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
                 || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
    if (ogMatch?.[1] && ogMatch[1].startsWith('http')) {
      logLine('corsproxy', 'tag-ok', `Fallback proxy found image for ${labelFromUrl(url)}`);
      return ogMatch[1];
    }
    return null;
  } catch { return null; }
}

// Master fetch — tries all strategies silently
async function fetchImageUrl(url) {
  const label = labelFromUrl(url);
  logLine('try', 'tag-try', `Fetching ${label}...`);

  // 1. Shopify JSON
  const shopify = await tryShopifyJson(url);
  if (shopify) return shopify;

  // 2. allorigins proxy + og:image parse
  const og = await tryOgImage(url);
  if (og) return og;

  // 3. corsproxy.io fallback
  const fallback = await tryCorsproxy(url);
  if (fallback) return fallback;

  logLine('failed', 'tag-fail', `Could not extract image from ${label}`);
  return null;
}

// ── Background removal ────────────────────────────────────────────────────
async function removeBg(imageUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const d = ctx.getImageData(0,0,c.width,c.height);
      const px = d.data, w = c.width, h = c.height;
      const corners = [
        [px[0],px[1],px[2]],
        [px[(w-1)*4],px[(w-1)*4+1],px[(w-1)*4+2]],
        [px[(h-1)*w*4],px[(h-1)*w*4+1],px[(h-1)*w*4+2]],
        [px[((h-1)*w+w-1)*4],px[((h-1)*w+w-1)*4+1],px[((h-1)*w+w-1)*4+2]]
      ];
      const bgR=Math.round(corners.reduce((a,c)=>a+c[0],0)/4);
      const bgG=Math.round(corners.reduce((a,c)=>a+c[1],0)/4);
      const bgB=Math.round(corners.reduce((a,c)=>a+c[2],0)/4);
      const tol=40;
      for(let i=0;i<px.length;i+=4){
        if(Math.abs(px[i]-bgR)<tol&&Math.abs(px[i+1]-bgG)<tol&&Math.abs(px[i+2]-bgB)<tol)
          px[i+3]=0;
      }
      ctx.putImageData(d,0,0);
      resolve(c.toDataURL('image/png'));
    };
    img.onerror = () => resolve(null);
    img.src = imageUrl;
  });
}

// ── Card helpers ──────────────────────────────────────────────────────────
function createCard(label) {
  const card = document.createElement('div');
  card.className = 'img-card';
  card.innerHTML = `
    <div class="checker"></div>
    <div class="card-badge">fetching</div>
    <div class="img-label">${label}</div>
    <div class="img-overlay">
      <button class="img-action" onclick="dlImg(this)">Download PNG</button>
      <button class="img-action" onclick="cpImg(this)">Copy</button>
    </div>`;
  return card;
}

function updateCard(card, imgUrl, state) {
  const badge = card.querySelector('.card-badge');
  if (state === 'done' && imgUrl) {
    if (badge) badge.remove();
    const im = document.createElement('img');
    im.src = imgUrl;
    card.insertBefore(im, card.querySelector('.img-overlay'));
    card.dataset.src = imgUrl;
  } else if (state === 'error') {
    if (badge) { badge.className = 'card-badge fail'; badge.textContent = 'failed'; }
    const ov = card.querySelector('.img-overlay');
    if (ov) ov.remove();
  } else if (badge) {
    badge.textContent = state;
  }
}

// ── Main handler ──────────────────────────────────────────────────────────
async function handleGo() {
  const brief    = document.getElementById('brief').value.trim();
  const mode     = document.getElementById('mode').value;
  const textarea = document.getElementById('brief');

  if (!brief) {
    textarea.classList.add('shake');
    setTimeout(() => textarea.classList.remove('shake'), 400);
    return;
  }

  const urls = extractUrls(brief);
  if (!urls.length) {
    setStatus('error', 'No product links found — paste at least one URL.');
    return;
  }

  document.getElementById('go-btn').disabled = true;
  document.getElementById('extract-results').classList.add('hidden');
  document.getElementById('bundle-results').classList.add('hidden');
  document.getElementById('extract-grid').innerHTML = '';
  document.getElementById('bundle-canvas').innerHTML = '';
  bImgs = [];
  clearLog();

  if (mode === 'transparent') await runExtract(urls);
  else await runBundle(urls);

  document.getElementById('go-btn').disabled = false;
}

// ── Extract mode ──────────────────────────────────────────────────────────
async function runExtract(urls) {
  document.getElementById('extract-results').classList.remove('hidden');
  const grid = document.getElementById('extract-grid');
  let done = 0;

  for (let i = 0; i < urls.length; i++) {
    setStatus('loading', `Processing ${i+1} of ${urls.length}...`);
    const label = labelFromUrl(urls[i]);
    const card  = createCard(label);
    grid.appendChild(card);

    try {
      const imgUrl = await fetchImageUrl(urls[i]);
      if (imgUrl) {
        updateCard(card, null, 'removing bg');
        const final = await removeBg(imgUrl);
        updateCard(card, final, final ? 'done' : 'error');
        if (final) done++;
      } else {
        updateCard(card, null, 'error');
      }
    } catch(e) {
      updateCard(card, null, 'error');
    }

    document.getElementById('extract-count').textContent = `${i+1} of ${urls.length}`;
  }

  setStatus('done', `Done — ${done} of ${urls.length} image${urls.length !== 1 ? 's' : ''} ready`);
}

// ── Bundle mode ───────────────────────────────────────────────────────────
async function runBundle(urls) {
  document.getElementById('bundle-results').classList.remove('hidden');

  for (let i = 0; i < urls.length; i++) {
    setStatus('loading', `Processing ${i+1} of ${urls.length}...`);
    try {
      const imgUrl = await fetchImageUrl(urls[i]);
      if (imgUrl) {
        const final = await removeBg(imgUrl);
        if (final) bImgs.push({ url: final, label: labelFromUrl(urls[i]) });
      }
    } catch(e) {}
  }

  renderBundleCanvas();
  setStatus('done', `Bundle ready — ${bImgs.length} product${bImgs.length !== 1 ? 's' : ''}`);
}

// ── Bundle canvas ─────────────────────────────────────────────────────────
function renderBundleCanvas() {
  const canvas = document.getElementById('bundle-canvas');
  canvas.innerHTML = '';
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  bImgs.forEach(img => {
    const el  = document.createElement('div');
    el.className = 'bundle-item';
    const sz  = Math.max(80, Math.min(200, w / Math.max(bImgs.length, 2) * 1.5));
    const ang = (Math.random() - 0.5) * 30;
    el.style.cssText = `width:${sz}px;height:${sz}px;left:${40+Math.random()*(w-sz-80)}px;top:${30+Math.random()*(h-sz-60)}px;transform:rotate(${ang}deg);`;
    el.dataset.angle = ang;
    el.innerHTML = `<img src="${img.url}" alt="${img.label}">`;
    makeDraggable(el);
    canvas.appendChild(el);
  });
}

function makeDraggable(el) {
  el.addEventListener('mousedown', e => {
    e.preventDefault();
    document.querySelectorAll('.bundle-item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    const er = el.getBoundingClientRect();
    dragOff.x = e.clientX - er.left;
    dragOff.y = e.clientY - er.top;
    const mv = e => {
      const cr = el.parentElement.getBoundingClientRect();
      el.style.left = Math.max(-20, Math.min(cr.width-60,  e.clientX-cr.left-dragOff.x)) + 'px';
      el.style.top  = Math.max(-20, Math.min(cr.height-60, e.clientY-cr.top-dragOff.y))  + 'px';
    };
    const up = () => { document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', up);
  });
}

function autoArrange() {
  const items = document.querySelectorAll('#bundle-canvas .bundle-item');
  const w     = document.getElementById('bundle-canvas').offsetWidth;
  const cols  = Math.ceil(Math.sqrt(items.length));
  const sz    = Math.min(150, w/cols - 20);
  items.forEach((el, i) => {
    el.style.left      = (i%cols)*(sz+16)+20 + 'px';
    el.style.top       = Math.floor(i/cols)*(sz+16)+20 + 'px';
    el.style.width     = sz + 'px';
    el.style.height    = sz + 'px';
    el.style.transform = `rotate(${(Math.random()-.5)*18}deg)`;
  });
}

function shuffleArrange() {
  const canvas = document.getElementById('bundle-canvas');
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  document.querySelectorAll('#bundle-canvas .bundle-item').forEach(el => {
    const sz = parseInt(el.style.width)||130;
    el.style.left      = 20+Math.random()*(w-sz-40) + 'px';
    el.style.top       = 20+Math.random()*(h-sz-40) + 'px';
    el.style.transform = `rotate(${(Math.random()-.5)*32}deg)`;
  });
}

function clearSelected() {
  document.querySelectorAll('.bundle-item').forEach(i => i.classList.remove('selected'));
}

async function exportBundle() {
  clearSelected();
  const canvas = document.getElementById('bundle-canvas');
  const out = document.createElement('canvas');
  out.width  = canvas.offsetWidth * 2;
  out.height = canvas.offsetHeight * 2;
  const ctx  = out.getContext('2d');
  ctx.scale(2, 2);
  for (const el of canvas.querySelectorAll('.bundle-item')) {
    const img = el.querySelector('img');
    const x=parseFloat(el.style.left), y=parseFloat(el.style.top);
    const w=el.offsetWidth, h=el.offsetHeight;
    const ang=parseFloat(el.dataset.angle||0)*Math.PI/180;
    await new Promise(res => {
      const i=new Image();
      i.onload=()=>{ctx.save();ctx.translate(x+w/2,y+h/2);ctx.rotate(ang);ctx.drawImage(i,-w/2,-h/2,w,h);ctx.restore();res();};
      i.src=img.src;
    });
  }
  const a=document.createElement('a');
  a.href=out.toDataURL('image/png');
  a.download='bundle-'+Date.now()+'.png';
  a.click();
}

function dlImg(btn) {
  const src=btn.closest('.img-card').dataset.src;
  if(!src)return;
  const a=document.createElement('a');a.href=src;a.download='product-'+Date.now()+'.png';a.click();
}

async function cpImg(btn) {
  const src=btn.closest('.img-card').dataset.src;
  if(!src)return;
  try {
    const blob=await(await fetch(src)).blob();
    await navigator.clipboard.write([new ClipboardItem({[blob.type]:blob})]);
    btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);
  } catch {btn.textContent='Error';setTimeout(()=>btn.textContent='Copy',1500);}
}
</script>
